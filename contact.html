<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我 | MuSHAN</title>
    <link rel="icon" href="images/favicon.png" type="image/png">
    <style>
        /* 直接复用首页的样式，保持风格一致 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
            line-height: 1.6;
            color: #1a1a1a;
            background-color: #faf9f8;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .site-header {
            background: #fff;
            border-bottom: 1px solid #eaeaea;
            padding: 1.5rem 0;
            position: sticky;
            top: 0;
            backdrop-filter: blur(8px);
            background-color: rgba(255, 255, 255, 0.9);
            z-index: 100;
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .blog-title {
            font-size: 1.8rem;
            font-weight: 700;
        }

        .blog-title a {
            text-decoration: none;
            color: #111;
        }

        .nav-links {
            display: flex;
            gap: 1.8rem;
        }

        .nav-links a {
            text-decoration: none;
            color: #444;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #0077cc;
        }

        .contact-card {
            background: #fff;
            border-radius: 20px;
            padding: 2rem;
            margin: 3rem 0;
            border: 1px solid #efefef;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
        }

        .contact-card h1 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            border-left: 5px solid #0077cc;
            padding-left: 1rem;
        }

        .contact-info {
            font-size: 1.1rem;
            margin: 1.5rem 0;
            color: #2c3e50;
        }

        .contact-info p {
            margin: 0.8rem 0;
        }

        .contact-info a {
            color: #0077cc;
            text-decoration: none;
        }

        .site-footer {
            border-top: 1px solid #eaeaea;
            padding: 2rem 0;
            text-align: center;
            color: #6c757d;
            font-size: 0.85rem;
            margin-top: 2rem;
        }

        @media (max-width: 768px) {
            .header-inner {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
        }
    </style>
</head>

<body>
    <header class="site-header">
        <div class="container header-inner">
            <div class="blog-title">
                <a href="index.html">MuSHAN</a>
            </div>
            <nav class="nav-links">
                <a href="index.html">首页</a>
                <a href="#">项目</a>
                <a href="about.html">关于</a>
                <a href="contact.html">联系</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <div class="contact-card">
            <h1>📬 联系我</h1>
            <div class="contact-info">
                <p>✉️ 邮箱：<a href="mailto:MuSHANwyc@outlook.com">MuSHANwyc@outlook.com</a></p>
                <p>🐙 GitHub：<a href="https://github.com/MuSHANw" target="_blank">@MuSHANw</a></p>
                <p>📺 B站：<a href="https://space.bilibili.com/2062689158" target="_blank">@暮山凝紫awa</a></p>
                <p>📱 微信：MuSHANwyc</p>
                <p>💬 也可以在下方评论区留言</p>
            </div>
            <p style="color:#6c757d; margin-top:1rem;">有什么想聊的，随时发邮件给我～</p>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>© 2026 MuSHAN · 简单生活，认真写作</p>
        </div>
    </footer>
</body>

</html>
